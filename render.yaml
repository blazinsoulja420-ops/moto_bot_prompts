services:
  - type: web
    name: sms-email-poc
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r sms_email_poc/requirements.txt
    startCommand: uvicorn sms_email_poc.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: DEFAULT_SMS_FORWARD
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
